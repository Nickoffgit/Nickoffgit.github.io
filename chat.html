<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Чат — MikaMaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet" />
    <style>
        /* стили без изменений */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --blue: #0f2b4b;
            --blue-light: #1a3f6a;
            --blue-pale: #e8eef6;
            --green: #3b8c5e;
            --green-light: #e6f4ed;
            --gray-50: #f8f9fb;
            --gray-100: #f0f2f5;
            --gray-200: #e2e6ed;
            --gray-300: #c9d0db;
            --gray-400: #a0aab8;
            --gray-500: #6b7a8d;
            --gray-600: #4a5a6e;
            --gray-700: #2d3a4f;
            --gray-800: #1a2538;
            --white: #ffffff;
            --radius: 20px;
            --radius-sm: 12px;
            --shadow-card: 0 4px 24px rgba(15, 43, 75, 0.06);
            --font: 'Inter', sans-serif;
        }
        body { font-family: var(--font); background: var(--gray-50); color: var(--gray-700); line-height: 1.6; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 24px; }
        .chat-card { background: var(--white); border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow-card); border: 1px solid var(--gray-100); }
        .chat-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gray-200); padding-bottom: 16px; margin-bottom: 20px; }
        .chat-header h2 { font-size: 22px; color: var(--gray-800); }
        .chat-header .actions { display: flex; gap: 12px; align-items: center; }
        .chat-header .actions .btn-danger { background: #c62828; color: white; border: none; border-radius: var(--radius-sm); padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .chat-header .actions .btn-danger:hover { background: #b71c1c; }
        .chat-header a { color: var(--blue); font-weight: 500; text-decoration: underline; }
        .messages { max-height: 400px; overflow-y: auto; margin-bottom: 20px; padding-right: 8px; }
        .message { padding: 10px 14px; margin-bottom: 10px; border-radius: var(--radius-sm); background: var(--gray-50); max-width: 80%; }
        .message.own { background: var(--blue-pale); margin-left: auto; }
        .message .sender { font-size: 12px; font-weight: 600; color: var(--blue); }
        .message .text { font-size: 15px; }
        .message .time { font-size: 11px; color: var(--gray-400); text-align: right; margin-top: 4px; }
        .input-area { display: flex; gap: 12px; border-top: 1px solid var(--gray-200); padding-top: 16px; }
        .input-area input { flex: 1; padding: 12px 16px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 15px; font-family: inherit; }
        .input-area input:focus { outline: none; border-color: var(--blue); }
        .input-area .btn { padding: 12px 32px; background: var(--blue); color: white; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: 0.3s; }
        .input-area .btn:hover { background: var(--blue-light); }
        .input-area .btn.btn-success { background: var(--green); }
        .input-area .btn.btn-success:hover { background: #2d7a4e; }
        .empty { color: var(--gray-400); text-align: center; padding: 20px 0; }
        .btn-back { display: inline-block; margin-bottom: 16px; color: var(--blue); font-weight: 500; text-decoration: underline; }
        .chat-actions { display: flex; gap: 12px; margin-bottom: 16px; }
        .disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
<div class="container">
    <a href="#" class="btn-back" id="backLink">← Назад</a>
    <div class="chat-card">
        <div class="chat-header">
            <h2 id="chatTitle">Чат</h2>
            <div class="actions">
                <button class="btn-danger" id="deleteChatBtn">🗑 Удалить чат</button>
            </div>
        </div>
        <div class="chat-actions" id="chatActions">
            <!-- кнопка завершения -->
        </div>
        <div class="messages" id="messagesContainer">
            <div class="empty">Загрузка сообщений...</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." />
            <button class="btn" id="sendBtn">Отправить</button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // ============================================================
    function getCurrentUser() {
        const data = localStorage.getItem('mikamaster_current_user');
        return data ? JSON.parse(data) : null;
    }
    function getChats() {
        const data = localStorage.getItem('mikamaster_chats');
        return data ? JSON.parse(data) : {};
    }
    function saveChats(chats) {
        localStorage.setItem('mikamaster_chats', JSON.stringify(chats));
    }
    function getTenders() {
        const data = localStorage.getItem('mikamaster_tenders');
        return data ? JSON.parse(data) : [];
    }
    function saveTenders(tenders) {
        localStorage.setItem('mikamaster_tenders', JSON.stringify(tenders));
    }
    function getRequests() {
        const data = localStorage.getItem('mikamaster_requests');
        return data ? JSON.parse(data) : [];
    }
    function saveRequests(requests) {
        localStorage.setItem('mikamaster_requests', JSON.stringify(requests));
    }

    // ============================================================
    // ОСНОВНОЙ КОД (без выброса исключений)
    // ============================================================
    const user = getCurrentUser();
    if (!user) {
        window.location.href = 'login.html?action=login';
        // остановим выполнение, т.к. редирект произойдёт
    }

    // Функция для отключения интерфейса чата
    function disableChatInterface() {
        document.querySelector('.input-area').style.display = 'none';
        document.getElementById('deleteChatBtn').style.display = 'none';
        document.getElementById('chatActions').style.display = 'none';
    }

    const urlParams = new URLSearchParams(window.location.search);
    const chatKey = urlParams.get('chat');

    // Проверяем, что chatKey передан
    if (!chatKey) {
        document.getElementById('messagesContainer').innerHTML = '<div class="empty">Не указан чат</div>';
        document.getElementById('chatTitle').textContent = 'Чат не найден';
        disableChatInterface();
        // Устанавливаем ссылку "Назад"
        const backLink = document.getElementById('backLink');
        if (user && user.role === 'customer') {
            backLink.href = 'profile-customer.html?tab=messages';
        } else if (user && user.role === 'specialist') {
            backLink.href = 'profile-specialist.html?tab=messages';
        } else {
            backLink.href = 'index-customer.html';
        }
        // Останавливаем выполнение (без throw)
    } else {
        // Продолжаем нормальную работу чата
        const backLink = document.getElementById('backLink');
        if (user.role === 'customer') {
            backLink.href = 'profile-customer.html?tab=messages';
        } else {
            backLink.href = 'profile-specialist.html?tab=messages';
        }

        let chatType = 'tender';
        let entityId = null;
        if (chatKey.startsWith('tender_')) {
            chatType = 'tender';
            entityId = parseInt(chatKey.split('_')[1]);
        } else if (chatKey.startsWith('request_')) {
            chatType = 'request';
            entityId = parseInt(chatKey.split('_')[1]);
        } else {
            // Неизвестный тип чата
            document.getElementById('messagesContainer').innerHTML = '<div class="empty">Неизвестный чат</div>';
            document.getElementById('chatTitle').textContent = 'Чат не найден';
            disableChatInterface();
            // Останавливаем выполнение
        }

        // Проверяем, что entityId определен
        if (entityId === null) {
            // уже обработано выше, но на всякий случай
        } else {
            let entity = null;
            if (chatType === 'tender') {
                const tenders = getTenders();
                entity = tenders.find(t => t.id === entityId);
            } else if (chatType === 'request') {
                const requests = getRequests();
                entity = requests.find(r => r.id === entityId);
            }

            if (!entity) {
                document.getElementById('messagesContainer').innerHTML = '<div class="empty">Чат не найден</div>';
                document.getElementById('chatTitle').textContent = 'Чат не найден';
                disableChatInterface();
                // Останавливаем выполнение
            } else {
                // Всё в порядке, отображаем чат
                const services = entity.services ? entity.services.map(s => s.service).join(', ') : 'Без услуги';
                document.getElementById('chatTitle').textContent = `Чат: ${services}`;

                // ============================================================
                // ФУНКЦИИ ОТОБРАЖЕНИЯ И ОТПРАВКИ
                // ============================================================
                function renderMessages() {
                    const container = document.getElementById('messagesContainer');
                    const chats = getChats();
                    const messages = chats[chatKey]?.messages || [];
                    if (messages.length === 0) {
                        container.innerHTML = '<div class="empty">Нет сообщений. Начните диалог!</div>';
                        return;
                    }
                    container.innerHTML = messages.map(msg => {
                        if (msg.senderId === 'system') {
                            return `<div style="text-align:center; color:var(--gray-400); font-size:13px; padding:6px 0;">${msg.text}</div>`;
                        }
                        return `
                            <div class="message ${msg.senderId === user.id ? 'own' : ''}">
                                <div class="sender">${msg.senderId === user.id ? 'Вы' : 'Собеседник'}</div>
                                <div class="text">${msg.text}</div>
                                <div class="time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                            </div>
                        `;
                    }).join('');
                    container.scrollTop = container.scrollHeight;
                }

                function sendMessage() {
                    const input = document.getElementById('messageInput');
                    const text = input.value.trim();
                    if (!text || !chatKey) return;
                    const chats = getChats();
                    if (!chats[chatKey]) chats[chatKey] = { messages: [] };
                    chats[chatKey].messages.push({
                        senderId: user.id,
                        text: text,
                        timestamp: new Date().toISOString()
                    });
                    saveChats(chats);
                    input.value = '';
                    renderMessages();
                }

                document.getElementById('sendBtn').addEventListener('click', sendMessage);
                document.getElementById('messageInput').addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') sendMessage();
                });

                document.getElementById('deleteChatBtn').addEventListener('click', function() {
                    if (!confirm('Удалить этот чат? Сообщения будут потеряны.')) return;
                    const chats = getChats();
                    if (chats[chatKey]) {
                        delete chats[chatKey];
                        saveChats(chats);
                        alert('Чат удалён');
                        window.location.href = backLink.href;
                    }
                });

                function renderCompleteButton() {
                    const container = document.getElementById('chatActions');
                    if (!entity) {
                        container.innerHTML = '';
                        return;
                    }
                    if (chatType === 'tender') {
                        if (entity.status === 'in_progress') {
                            const isCustomer = entity.customerId === user.id;
                            if (isCustomer) {
                                container.innerHTML = `<button class="btn btn-success" id="completeWorkBtn">✅ Завершить работы</button>`;
                                document.getElementById('completeWorkBtn').addEventListener('click', function() {
                                    if (confirm('Подтвердить завершение работ?')) {
                                        completeWork();
                                    }
                                });
                                return;
                            }
                        }
                    } else if (chatType === 'request') {
                        if (entity.status === 'paid') {
                            const isCustomer = entity.customerId === user.id;
                            if (isCustomer) {
                                container.innerHTML = `<button class="btn btn-success" id="completeWorkBtn">✅ Завершить работы</button>`;
                                document.getElementById('completeWorkBtn').addEventListener('click', function() {
                                    if (confirm('Подтвердить завершение работ?')) {
                                        completeWork();
                                    }
                                });
                                return;
                            }
                        }
                    }
                    container.innerHTML = '';
                }

                function completeWork() {
                    if (!entity) return;
                    if (chatType === 'tender') {
                        if (entity.customerId !== user.id) {
                            alert('Только заказчик может завершить работы');
                            return;
                        }
                        entity.status = 'closed';
                        if (entity.responses) {
                            entity.responses.forEach(r => {
                                if (r.specialistId === entity.specialistId || r.status === 'paid') {
                                    r.status = 'completed';
                                }
                            });
                        }
                        const tenders = getTenders();
                        const idx = tenders.findIndex(t => t.id === entity.id);
                        if (idx !== -1) tenders[idx] = entity;
                        saveTenders(tenders);
                    } else if (chatType === 'request') {
                        if (entity.customerId !== user.id) {
                            alert('Только заказчик может завершить работы');
                            return;
                        }
                        entity.status = 'completed';
                        const requests = getRequests();
                        const idx = requests.findIndex(r => r.id === entity.id);
                        if (idx !== -1) requests[idx] = entity;
                        saveRequests(requests);
                    }
                    let chats = getChats();
                    if (!chats[chatKey]) chats[chatKey] = { messages: [] };
                    chats[chatKey].messages.push({
                        senderId: 'system',
                        text: 'Работы завершены заказчиком',
                        timestamp: new Date().toISOString()
                    });
                    saveChats(chats);
                    renderMessages();
                    renderCompleteButton();
                    alert('Работы завершены!');
                }

                // ============================================================
                // ПЕРИОДИЧЕСКОЕ ОБНОВЛЕНИЕ
                // ============================================================
                setInterval(() => {
                    if (!entity) return;
                    renderMessages();
                    if (chatType === 'tender') {
                        const tenders = getTenders();
                        const updatedTender = tenders.find(t => t.id === entityId);
                        if (updatedTender) {
                            entity = updatedTender;
                            renderCompleteButton();
                        }
                    } else if (chatType === 'request') {
                        const requests = getRequests();
                        const updatedRequest = requests.find(r => r.id === entityId);
                        if (updatedRequest) {
                            entity = updatedRequest;
                            renderCompleteButton();
                        }
                    }
                }, 5000);

                // ============================================================
                // ИНИЦИАЛИЗАЦИЯ
                // ============================================================
                renderMessages();
                renderCompleteButton();
            }
        }
    }
</script>
</body>
</html>
